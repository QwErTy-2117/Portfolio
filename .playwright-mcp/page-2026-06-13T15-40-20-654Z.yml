        - heading "Open-Source and Premium UI Components for Modern Apps" [level=2] [ref=e609]
        - paragraph [ref=e610]: A growing collection of beautifully designed, clean, and modern shadcn/ui components built for React and Next.js projects. These components focus on behavior, interaction, and reuse, helping teams build consistent interfaces, scalable design systems, and production-ready applications faster. Start with open-source components or use premium-ready patterns designed for real-world apps.
      - heading "Key Features" [level=3] [ref=e611]
      - list [ref=e612]:
        - listitem [ref=e613]: "Preview, copy, or install: Preview components live, copy and paste the code, or install directly using the Shadcn CLI and registry."
        - listitem [ref=e614]: "Easy to customize: Modify and extend layout, styles, and behavior directly in code without breaking structure, making them suitable for both open-source and production apps."
        - listitem [ref=e615]: "Structured components: Components follow common UI and interaction patterns for consistent use across forms, dashboards, landing pages, and applications."
        - listitem [ref=e616]: "Composable components: Combine multiple components without layout, spacing, or style conflicts across pages, templates, and scalable interfaces."
        - listitem [ref=e617]: "Variants and states included: Components include common variants and states such as hover, active, disabled, and loading, ensuring production-ready behavior."
        - listitem [ref=e618]: "Figma design alignment: Shadcn Figma UI Kit mirrors components and variants to support seamless design-to-code workflows."
        - listitem [ref=e619]: "Built with modern primitives: Developed using React, shadcn/ui, Tailwind CSS, and flexible UI primitives with support for both Base UI and Radix UI, ensuring a clear and consistent structure."
        - listitem [ref=e620]: "Works across React frameworks: Fully compatible with Next.js and modern React frameworks used in SaaS, admin dashboards, and production apps."
        - listitem [ref=e621]: "Accessibility focused: Includes responsive behavior, keyboard accessibility, and support for light and dark themes."
        - listitem [ref=e622]: "MCP Server integration: Browse, generate, and extend components directly within your development environment."
      - generic [ref=e623]:
