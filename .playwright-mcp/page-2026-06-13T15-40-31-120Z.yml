        - generic [ref=e268]:
          - generic [ref=e269]:
            - paragraph [ref=e270]: Shadcn Buttons are ready-to-use button components made for React and Next.js apps. They help you build clean, responsive, and interactive actions without overthinking styles or behavior.
            - paragraph [ref=e271]: Buttons are where users interact the most - submitting forms, opening dialogs, moving between pages. These buttons are built to feel fast, reliable, and familiar.
            - paragraph [ref=e272]:
              - text: Built with
              - strong [ref=e273]: React, Next.js, and Tailwind CSS
              - text: ", Shadcn Buttons start simple and stay flexible."
            - paragraph [ref=e274]: What you get is sensible defaults, clear states, and complete control over styling. No hidden logic, no magic. Whether your looking for a simple button or complete interactions, they fit naturally into modern web projects.
          - generic [ref=e275]:
            - heading "What Are Shadcn Buttons?" [level=2] [ref=e276]
            - paragraph [ref=e277]: Shadcn Buttons are reusable React components for common user actions. They support various styles, sizes, icons, and states (hover/focus/disabled/and loading).
            - paragraph [ref=e278]: Instead of restyling buttons over and over again, you style them once and use them everywhere. It means your UI is kept consistent and would be much easier to maintain.
          - generic [ref=e279]:
            - heading "Why Developers Use Shadcn Buttons" [level=2] [ref=e280]
            - list [ref=e281]:
              - listitem [ref=e282]: Easy to understand – Click, focus, shoot. Buttons behave as the user expects.
              - listitem [ref=e283]: Uniform UI – Same spacing, colors and working method in App.
              - listitem [ref=e284]: "Accessible by default: – Keyboard support, focus rings and good contrast are included out of the box."
              - listitem [ref=e285]: Optional animations – Include a tiny amount of movement to provide the user with feedback without impacting speed.
              - listitem [ref=e286]: Completely customizable – Adjust size, color, shape or motion with Tailwind classes.
            - heading "Key Features of Buttons" [level=3] [ref=e287]
            - list [ref=e288]:
              - listitem [ref=e289]: "Multiple styles: solid, outline, ghost, link, destructive"
              - listitem [ref=e290]: "Sizes that are compatible great together: small, default, large, icon-only."
              - listitem [ref=e291]: "Icon support : icons in front / behind text"
              - listitem [ref=e292]: Keyboard & screen-reader friendly
              - listitem [ref=e293]: Tailwind-first styling for full control
            - heading "Button Usage Tips" [level=4] [ref=e294]
            - list [ref=e295]:
              - listitem [ref=e296]: "Keep primary actions clear: The main buttons need to pop."
              - listitem [ref=e297]: "Use lightweight animations: Micro hover, or press effects are good."
              - listitem [ref=e298]: "Consider touch: Buttons need to be easy to tap on mobile."
              - listitem [ref=e299]: "Variants reuse: Define styles once and keep using it."
          - generic [ref=e300]:
            - heading "Works Well With Other Components" [level=2] [ref=e301]
            - paragraph [ref=e302]: Shadcn Buttons fit perfectly with the rest of the Shadcn UI ecosystem.
            - paragraph [ref=e303]:
              - text: Use them in
              - strong [ref=e304]: Cards, Dialogs, Forms,
              - text: and
              - strong [ref=e305]: Tables.
              - text: Pair icon-only buttons with
              - strong [ref=e306]: Tooltips
              - text: ", or combine them with"
              - strong [ref=e307]: Badges
              - text: to show counts or status.
            - paragraph [ref=e308]: They are a solid foundation for building UI across your whole application.
